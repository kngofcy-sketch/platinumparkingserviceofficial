<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS Platinum | Logística de Parking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="galeria" class="container config-container">
        <h2 class="section-title">APS Platinum <span class="neon-text">Hot Zones</span></h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="website/tucandelaw.jpeg" alt="Tucandela"></div>
            <div class="gallery-item"><img src="website/manta.jpeg" alt="Manta"></div>
            <div class="gallery-item"><img src="website/canta_corazon.jpeg" alt="Canta Corazon"></div>
            <div class="gallery-item"><img src="website/sweet_caroline.jpeg" alt="Sweet Caroline"></div>
            <div class="gallery-item"><img src="website/electric23.png" alt="Electric 23"></div>
            <div class="gallery-item"><img src="website/hiya.jpeg" alt="Hiyakawa"></div>
            <div class="gallery-item"><img src="website/image_195000.jpg" alt="McLaren"></div>
            <div class="gallery-item"><img src="website/image_194c86.jpg" alt="Flota"></div>
        </div>
    </section>

    <section class="container config-container">
        <form id="quote-form">
            <h3>Cotización B2B</h3>
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="email" name="email" placeholder="Email" required>
            <button type="submit" id="submit-btn">Enviar</button>
        </form>
        <div id="form-feedback" class="hidden"></div>
    </section>

    <script src="main.js"></script>
</body>
</html>
