<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS Platinum | Logística</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-wrapper"></div>

    <nav>
        <a href="#galeria">Hot Zones</a>
        <a href="#hiring">Hiring</a>
        <a href="#contact">Contacto</a>
    </nav>

    <section id="galeria">
        <h1>APS Platinum Hot Zones</h1>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="tucandelaw.jpeg" alt="Tucandela"></div>
            <div class="gallery-item"><img src="manta.jpeg" alt="Manta"></div>
            <div class="gallery-item"><img src="canta_corazon.jpeg" alt="Canta"></div>
            <div class="gallery-item"><img src="sweet_caroline.jpeg" alt="Sweet"></div>
            <div class="gallery-item"><img src="electric23.png" alt="Electric"></div>
            <div class="gallery-item"><img src="hiya.jpeg" alt="Hiyakawa"></div>
            <div class="gallery-item"><img src="image_195000.jpg" alt="McLaren"></div>
            <div class="gallery-item"><img src="image_194c86.jpg" alt="Flota"></div>
        </div>
    </section>

    <section id="hiring">
        <h2>Join Our Valet Hiring Process</h2>
    </section>

    <section id="contact">
        <form id="quote-form">
            <h3>Contacto</h3>
            <input type="text" name="nombre" placeholder="Nombre" required>
            <button type="submit">Enviar</button>
        </form>
        <div id="form-feedback" class="hidden"></div>
    </section>

    <script src="main.js"></script>
</body>
</html>
