<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS Platinum | Logística de Parking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">...</nav>

    <section class="hero">...</section>

    <section id="contacto" class="quote-section">
        <div class="container config-container">
            <h2 class="section-title">Solicita una Cotización B2B</h2>
            <div class="form-card">
                <form id="quote-form">
                    <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                    <div class="form-group"><label>Mensaje</label><textarea name="mensaje" rows="4" required></textarea></div>
                    <button type="submit" class="btn-primary full-width" id="submit-btn">Enviar Mensaje</button>
                </form>
                <div id="form-feedback" class="feedback-msg hidden"></div>
            </div>
        </div>
    </section>

    <section id="hiring" class="services-section" style="background-color: var(--bg-main);">
        <div class="container config-container">
            <h2 class="section-title">Únete al Equipo <span class="neon-text">Platinum</span></h2>
            <p class="text-muted text-center mb-2">Buscamos operadores de excelencia. Aplica para formar parte de la élite de APS.</p>
            <div class="form-card">
                <form id="hiring-form">
                    <div class="form-group"><label>Nombre Completo</label><input type="text" name="nombre" required></div>
                    <div class="form-group">
                        <label>¿Tienes licencia vigente y registro limpio?</label>
                        <select name="licencia" required><option value="si">Sí</option><option value="no">No</option></select>
                    </div>
                    <div class="form-group"><label>Años de experiencia en Valet</label><input type="number" name="experiencia" required></div>
                    <button type="submit" class="btn-primary full-width" id="hiring-btn">Enviar Aplicación</button>
                </form>
                <div id="hiring-feedback" class="feedback-msg hidden"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <button class="btn-link" onclick="togglePrivacyModal()">Política de Privacidad</button>
    </footer>

    <div id="privacy-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="togglePrivacyModal()">&times;</span>
            <h2>Privacidad</h2>
            <p>Tus datos están seguros con APS Platinum...</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
